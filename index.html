<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Brötchenbestellung</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #ffffff; --bg2: #f5f4f0;
      --text: #1a1a18; --text2: #6b6a65; --text3: #a8a7a2;
      --border: rgba(0,0,0,0.12); --border2: rgba(0,0,0,0.22);
      --radius: 8px; --radius-lg: 12px;
      --accent: #1d9e75; --danger: #e24b4a;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1c1c1a; --bg2: #252523;
        --text: #f0ede6; --text2: #9c9b96; --text3: #5f5e5a;
        --border: rgba(255,255,255,0.10); --border2: rgba(255,255,255,0.20);
      }
    }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; background: var(--bg2); color: var(--text); min-height: 100vh; padding: 1.5rem 1rem 4rem; }
    .container { max-width: 900px; margin: 0 auto; }
    header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 10px; }
    header h1 { font-size: 20px; font-weight: 500; }
    .status-label { font-size: 13px; color: var(--text2); display: flex; align-items: center; gap: 6px; }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #ccc; transition: background 0.3s; flex-shrink: 0; }
    .status-dot.online { background: var(--accent); }
    .status-dot.offline { background: var(--danger); }
    .sync-badge { font-size: 11px; color: var(--text3); opacity: 0; transition: opacity 0.3s; }
    .sync-badge.visible { opacity: 1; }
    .card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 1.25rem 1.5rem; margin-bottom: 1.25rem; }
    .section-label { font-size: 11px; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; color: var(--text2); margin-bottom: 12px; }
    .types-grid { display: grid; grid-template-columns: repeat(6, 1fr); gap: 8px; }
    @media (max-width: 580px) { .types-grid { grid-template-columns: repeat(3, 1fr); } }
    .type-wrap { display: flex; flex-direction: column; gap: 4px; }
    .type-num { font-size: 10px; color: var(--text3); text-align: center; }
    .type-input { width: 100%; font-size: 13px; padding: 7px 6px; border: 0.5px solid var(--border2); border-radius: var(--radius); background: var(--bg); color: var(--text); text-align: center; }
    .type-input:focus { outline: none; box-shadow: 0 0 0 2px var(--accent); }
    .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
    table { width: 100%; border-collapse: collapse; min-width: 500px; }
    thead th { font-size: 11px; font-weight: 500; color: var(--text2); padding: 8px 6px; text-align: center; border-bottom: 0.5px solid var(--border); white-space: nowrap; }
    thead th.col-name { text-align: left; min-width: 110px; }
    tbody tr { border-bottom: 0.5px solid var(--border); }
    tbody tr:last-child { border-bottom: none; }
    tbody td { padding: 10px 6px; text-align: center; vertical-align: middle; }
    tbody td.col-name { text-align: left; }
    .name-input { width: 100%; font-size: 14px; border: none; background: transparent; color: var(--text); padding: 0; }
    .name-input:focus { outline: none; }
    .qty-cell { display: inline-flex; align-items: center; gap: 4px; }
    .qty-btn { width: 32px; height: 32px; border: 0.5px solid var(--border2); border-radius: var(--radius); background: transparent; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; color: var(--text2); user-select: none; -webkit-user-select: none; }
    .qty-btn:active { background: var(--bg2); opacity: 0.7; }
    .qty-val { display: inline-block; min-width: 26px; font-size: 15px; font-weight: 500; color: var(--text); text-align: center; }
    .qty-val.zero { color: var(--text3); font-weight: 400; }
    .col-total { font-size: 13px; font-weight: 500; color: var(--text2); }
    tfoot tr { background: var(--bg2); }
    tfoot td { padding: 10px 6px; text-align: center; font-size: 13px; font-weight: 500; color: var(--text); }
    tfoot td.col-name { text-align: left; }
    .bottom-bar { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; margin-top: 1.25rem; }
    .grand-total { display: flex; flex-direction: column; gap: 2px; }
    .grand-label { font-size: 12px; color: var(--text2); }
    .grand-val { font-size: 24px; font-weight: 500; color: var(--text); }
    .actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .btn { display: inline-flex; align-items: center; gap: 6px; padding: 9px 18px; font-size: 14px; border: 0.5px solid var(--border2); border-radius: var(--radius); background: transparent; color: var(--text); cursor: pointer; transition: background 0.15s; }
    .btn:hover { background: var(--bg2); }
    .btn.primary { background: var(--accent); color: #fff; border-color: transparent; }
    .btn.primary:hover { opacity: 0.9; }
    .btn.danger { color: var(--danger); border-color: rgba(226,75,74,0.4); }
    .btn.danger:hover { background: rgba(226,75,74,0.06); }
    #toast { position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%); background: var(--text); color: var(--bg); padding: 10px 20px; border-radius: 20px; font-size: 13px; opacity: 0; transition: opacity 0.3s; pointer-events: none; white-space: nowrap; z-index: 999; }
    #toast.show { opacity: 1; }
    @media print {
      body { background: #fff; padding: 1rem; }
      .no-print { display: none !important; }
      .qty-btn { display: none; }
      .card { border: 1px solid #ccc; }
    }
  </style>
</head>
<body>
<div class="container">
  <header>
    <div>
      <h1>🥖 Brötchenbestellung <span class="sync-badge" id="sync-badge">wird gespeichert…</span></h1>
    </div>
    <span class="status-label"><span class="status-dot" id="status-dot"></span><span id="status-text">Verbinde…</span></span>
  </header>

  <div class="card no-print">
    <div class="section-label">Brötchenarten — hier eintragen</div>
    <div class="types-grid" id="types-grid"></div>
  </div>

  <div class="card">
    <div class="section-label">Bestellung</div>
    <div class="table-wrap">
      <table>
        <thead><tr id="header-row"></tr></thead>
        <tbody id="order-body"></tbody>
        <tfoot id="order-foot"></tfoot>
      </table>
    </div>
  </div>

  <div class="bottom-bar">
    <div class="grand-total">
      <span class="grand-label">Gesamt</span>
      <span class="grand-val" id="grand-val">0 Brötchen</span>
    </div>
    <div class="actions no-print">
      <button class="btn danger" onclick="resetOrders()">↺ Zahlen zurücksetzen</button>
      <button class="btn primary" onclick="window.print()">🖨 Drucken / PDF</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAsM9t8vN5FOjJxUpRU4rtbifoFxrqF2uE",
    authDomain: "backwarenbestellung.firebaseapp.com",
    databaseURL: "https://backwarenbestellung-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "backwarenbestellung",
    storageBucket: "backwarenbestellung.firebasestorage.app",
    messagingSenderId: "774616678398",
    appId: "1:774616678398:web:34de8a957adc4c4a378aaf"
  };

  const NUM_FAM = 5, NUM_TYPES = 6;
  let state = defaultState();
  let syncTimer = null;

  function defaultState() {
    return {
      types: Array(NUM_TYPES).fill(''),
      families: Array.from({length: NUM_FAM}, (_, i) => ({ name: `Familie ${i+1}`, qty: Array(NUM_TYPES).fill(0) }))
    };
  }

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const dbRef = ref(db, 'bestellung');

  // Live-Sync von Firebase
  onValue(dbRef, snap => {
    const data = snap.val();
    if (data) {
      if (Array.isArray(data.types) && data.types.length === NUM_TYPES) state.types = data.types;
      if (Array.isArray(data.families) && data.families.length === NUM_FAM) state.families = data.families;
    }
    setStatus(true, 'Live-Sync aktiv ✓');
    buildAll();
  }, e => {
    setStatus(false, 'Verbindungsfehler');
    toast('Firebase Fehler: ' + e.message);
  });

  function push() {
    showSync();
    clearTimeout(syncTimer);
    syncTimer = setTimeout(() => {
      set(dbRef, state).then(hideSync).catch(e => { hideSync(); toast('Fehler: ' + e.message); });
    }, 400);
  }

  function setStatus(ok, txt) {
    const d = document.getElementById('status-dot'), l = document.getElementById('status-text');
    if (d) d.className = 'status-dot ' + (ok ? 'online' : 'offline');
    if (l) l.textContent = txt;
  }
  function showSync() { const b = document.getElementById('sync-badge'); if (b) b.className = 'sync-badge visible'; }
  function hideSync() { const b = document.getElementById('sync-badge'); if (b) b.className = 'sync-badge'; }

  function typeLabel(i) { return (state.types[i] || '').trim() || `Typ ${i+1}`; }

  function buildAll() {
    buildTypesGrid(); buildHeaders(); buildBody(); renderFoot(); updateGrand();
  }

  function buildTypesGrid() {
    const grid = document.getElementById('types-grid'); if (!grid) return;
    grid.innerHTML = '';
    state.types.forEach((t, i) => {
      const wrap = document.createElement('div'); wrap.className = 'type-wrap';
      const num = document.createElement('div'); num.className = 'type-num'; num.textContent = `#${i+1}`;
      const inp = document.createElement('input');
      inp.className = 'type-input'; inp.type = 'text'; inp.value = t;
      inp.placeholder = `Typ ${i+1}`; inp.maxLength = 18;
      let timer;
      inp.addEventListener('input', e => {
        state.types[i] = e.target.value;
        const th = document.getElementById(`th-${i}`); if (th) th.textContent = typeLabel(i);
        clearTimeout(timer); timer = setTimeout(push, 700);
      });
      wrap.appendChild(num); wrap.appendChild(inp); grid.appendChild(wrap);
    });
  }

  function buildHeaders() {
    const hr = document.getElementById('header-row'); if (!hr) return;
    hr.innerHTML = '';
    const th0 = document.createElement('th'); th0.className = 'col-name'; th0.textContent = 'Familie'; hr.appendChild(th0);
    state.types.forEach((_, i) => {
      const th = document.createElement('th'); th.id = `th-${i}`; th.textContent = typeLabel(i); hr.appendChild(th);
    });
    const thT = document.createElement('th'); thT.textContent = 'Gesamt'; hr.appendChild(thT);
  }

  function buildBody() {
    const body = document.getElementById('order-body'); if (!body) return;
    body.innerHTML = '';
    state.families.forEach((fam, fi) => {
      const tr = document.createElement('tr');
      const td0 = document.createElement('td'); td0.className = 'col-name';
      const inp = document.createElement('input');
      inp.className = 'name-input'; inp.type = 'text'; inp.value = fam.name;
      inp.placeholder = `Familie ${fi+1}`; inp.maxLength = 30;
      let nt;
      inp.addEventListener('input', e => { state.families[fi].name = e.target.value; clearTimeout(nt); nt = setTimeout(push, 700); });
      td0.appendChild(inp); tr.appendChild(td0);

      fam.qty.forEach((q, ti) => {
        const td = document.createElement('td');
        const cell = document.createElement('div'); cell.className = 'qty-cell';
        const minus = document.createElement('button'); minus.className = 'qty-btn'; minus.textContent = '−';
        minus.onclick = () => { if (state.families[fi].qty[ti] > 0) { state.families[fi].qty[ti]--; updateCellUI(fi,ti); updateRTUI(fi); renderFoot(); updateGrand(); push(); } };
        const val = document.createElement('span');
        val.className = 'qty-val'+(q===0?' zero':''); val.id = `q-${fi}-${ti}`; val.textContent = q;
        const plus = document.createElement('button'); plus.className = 'qty-btn'; plus.textContent = '+';
        plus.onclick = () => { state.families[fi].qty[ti]++; updateCellUI(fi,ti); updateRTUI(fi); renderFoot(); updateGrand(); push(); };
        cell.appendChild(minus); cell.appendChild(val); cell.appendChild(plus);
        td.appendChild(cell); tr.appendChild(td);
      });

      const tdT = document.createElement('td'); tdT.className = 'col-total'; tdT.id = `rt-${fi}`;
      tdT.textContent = fam.qty.reduce((a,b)=>a+b,0);
      tr.appendChild(tdT); body.appendChild(tr);
    });
  }

  function updateCellUI(fi, ti) {
    const el = document.getElementById(`q-${fi}-${ti}`); if (!el) return;
    const q = state.families[fi].qty[ti]; el.textContent = q; el.className = 'qty-val'+(q===0?' zero':'');
  }
  function updateRTUI(fi) {
    const el = document.getElementById(`rt-${fi}`); if (el) el.textContent = state.families[fi].qty.reduce((a,b)=>a+b,0);
  }
  function renderFoot() {
    const foot = document.getElementById('order-foot'); if (!foot) return;
    foot.innerHTML = '';
    const tr = document.createElement('tr');
    const td0 = document.createElement('td'); td0.className = 'col-name'; td0.textContent = 'Summe'; tr.appendChild(td0);
    let grand = 0;
    state.types.forEach((_, ti) => {
      const col = state.families.reduce((a,f)=>a+(f.qty[ti]||0),0); grand += col;
      const td = document.createElement('td'); td.textContent = col; tr.appendChild(td);
    });
    const tdT = document.createElement('td'); tdT.textContent = grand; tr.appendChild(tdT);
    foot.appendChild(tr);
  }
  function updateGrand() {
    const total = state.families.reduce((a,f)=>a+f.qty.reduce((b,c)=>b+c,0),0);
    const el = document.getElementById('grand-val'); if (el) el.textContent = total + ' Brötchen';
  }

  window.resetOrders = function() {
    if (!confirm('Alle Bestellzahlen auf 0 zurücksetzen?')) return;
    state.families.forEach(f => { f.qty = Array(NUM_TYPES).fill(0); });
    buildBody(); renderFoot(); updateGrand(); push(); toast('Bestellungen zurückgesetzt ✓');
  };

  function toast(msg) {
    const el = document.getElementById('toast'); el.textContent = msg; el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 3000);
  }
</script>
</body>
</html>
